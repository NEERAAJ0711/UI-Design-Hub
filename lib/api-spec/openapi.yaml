openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: KRA, KPI & Task Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: departments
    description: Department management
  - name: employees
    description: Employee management
  - name: kras
    description: KRA management
  - name: kpis
    description: KPI management
  - name: tasks
    description: Task management
  - name: dashboard
    description: Dashboard & analytics
  - name: designations
    description: Designation master management
  - name: companies
    description: Company master management

paths:
  # ── Auth ──────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Departments ──────────────────────────────────────────────────────────────
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "404":
          description: Not found
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Designations ──────────────────────────────────────────────────────────────
  /designations:
    get:
      operationId: listDesignations
      tags: [designations]
      summary: List all designations
      responses:
        "200":
          description: List of designations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Designation"
    post:
      operationId: createDesignation
      tags: [designations]
      summary: Create a designation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesignationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Designation"

  /designations/{id}:
    patch:
      operationId: updateDesignation
      tags: [designations]
      summary: Update a designation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesignationInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Designation"
    delete:
      operationId: deleteDesignation
      tags: [designations]
      summary: Delete a designation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Companies ──────────────────────────────────────────────────────────────────
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Employees ─────────────────────────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees
      parameters:
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: role
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── KRAs ──────────────────────────────────────────────────────────────────────
  /kras:
    get:
      operationId: listKras
      tags: [kras]
      summary: List KRAs
      parameters:
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: employeeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of KRAs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Kra"
    post:
      operationId: createKra
      tags: [kras]
      summary: Create a KRA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KraInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kra"

  /kras/{id}:
    get:
      operationId: getKra
      tags: [kras]
      summary: Get a KRA
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: KRA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kra"
    patch:
      operationId: updateKra
      tags: [kras]
      summary: Update a KRA
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KraUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kra"
    delete:
      operationId: deleteKra
      tags: [kras]
      summary: Delete a KRA
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /kras/{id}/score:
    patch:
      operationId: scoreKra
      tags: [kras]
      summary: Update KRA achievement score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KraScoreInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kra"

  /kras/{id}/submit:
    patch:
      operationId: submitKraForClosure
      tags: [kras]
      summary: Employee submits KRA for closure
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kra"

  /kras/{id}/hr-approve:
    patch:
      operationId: hrApproveKra
      tags: [kras]
      summary: HR department approves or rejects a new KRA
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HrApproveKraInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kra"

  /kras/{id}/approve-close:
    patch:
      operationId: approveKraClosure
      tags: [kras]
      summary: Manager or HOD approves/rejects KRA closure
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveCloseInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kra"

  # ── KPIs ──────────────────────────────────────────────────────────────────────
  /kpis:
    get:
      operationId: listKpis
      tags: [kpis]
      summary: List KPIs
      parameters:
        - name: employeeId
          in: query
          schema:
            type: integer
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of KPIs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Kpi"
    post:
      operationId: createKpi
      tags: [kpis]
      summary: Create a KPI record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KpiInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kpi"

  /kpis/{id}:
    get:
      operationId: getKpi
      tags: [kpis]
      summary: Get a KPI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: KPI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kpi"
    patch:
      operationId: updateKpi
      tags: [kpis]
      summary: Update a KPI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KpiUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kpi"
    delete:
      operationId: deleteKpi
      tags: [kpis]
      summary: Delete a KPI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Tasks ─────────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: assignedToId
          in: query
          schema:
            type: integer
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/{id}/status:
    patch:
      operationId: updateTaskStatus
      tags: [tasks]
      summary: Update task status (manager/HOD/management direct)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskStatusInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/request-status:
    patch:
      operationId: requestTaskStatus
      tags: [tasks]
      summary: Employee requests a task status change (pending approval)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskStatusRequestInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/approve-status:
    patch:
      operationId: approveTaskStatus
      tags: [tasks]
      summary: Manager or HOD approves/rejects an employee task status request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskStatusApprovalInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/comments:
    get:
      operationId: listTaskComments
      tags: [tasks]
      summary: List comments for a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskComment"
    post:
      operationId: addTaskComment
      tags: [tasks]
      summary: Add a comment to a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskComment"

  # ── Dashboard ─────────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall dashboard summary metrics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/department-performance:
    get:
      operationId: getDepartmentPerformance
      tags: [dashboard]
      summary: Get performance breakdown by department
      responses:
        "200":
          description: Department performance list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentPerformance"

  /dashboard/task-status-breakdown:
    get:
      operationId: getTaskStatusBreakdown
      tags: [dashboard]
      summary: Get task count grouped by status
      responses:
        "200":
          description: Task status breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskStatusCount"

  /dashboard/top-performers:
    get:
      operationId: getTopPerformers
      tags: [dashboard]
      summary: Get top performing employees
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Top performers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeePerformance"

  /dashboard/overdue-tasks:
    get:
      operationId: getOverdueTasks
      tags: [dashboard]
      summary: Get overdue tasks
      responses:
        "200":
          description: Overdue tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/employee-summary:
    get:
      operationId: getEmployeeDashboardSummary
      tags: [dashboard]
      summary: Get employee-specific dashboard summary
      parameters:
        - name: employeeId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDashboardSummary"

  /dashboard/pending-approvals:
    get:
      operationId: getPendingApprovals
      tags: [dashboard]
      summary: Get pending KRA closures and task status requests (manager/HOD)
      parameters:
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: approverId
          in: query
          schema:
            type: integer
        - name: role
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Pending approvals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingApprovals"

components:
  schemas:
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string, minLength: 1 }

    CurrentUser:
      type: object
      required: [id, name, email, role, departmentId]
      properties:
        id:             { type: integer }
        name:           { type: string }
        email:          { type: string }
        role:           { type: string, enum: [admin, management, hod, manager, employee] }
        designation:    { type: ["string", "null"] }
        company:       { type: ["string", "null"] }
        departmentId:   { type: integer }
        departmentName: { type: ["string", "null"] }
        managerId:      { type: ["integer", "null"] }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Designation ─────────────────────────────────────────────────────────────
    Designation:
      type: object
      required: [id, name, createdAt]
      properties:
        id:        { type: integer }
        name:      { type: string }
        createdAt: { type: string }

    DesignationInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }

    # ── Company ──────────────────────────────────────────────────────────────────
    Company:
      type: object
      required: [id, name, createdAt]
      properties:
        id:        { type: integer }
        name:      { type: string }
        createdAt: { type: string }

    CompanyInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }

    # ── Department ──────────────────────────────────────────────────────────────
    Department:
      type: object
      required: [id, name, createdAt]
      properties:
        id:          { type: integer }
        name:        { type: string }
        description: { type: ["string", "null"] }
        headId:      { type: ["integer", "null"] }
        headName:    { type: ["string", "null"] }
        employeeCount: { type: integer }
        createdAt:   { type: string }

    DepartmentInput:
      type: object
      required: [name]
      properties:
        name:        { type: string, minLength: 1 }
        description: { type: string }
        headId:      { type: integer }

    DepartmentUpdate:
      type: object
      properties:
        name:        { type: string, minLength: 1 }
        description: { type: string }
        headId:      { type: integer }

    # ── Employee ────────────────────────────────────────────────────────────────
    Employee:
      type: object
      required: [id, name, email, role, departmentId, departmentName, createdAt]
      properties:
        id:             { type: integer }
        name:           { type: string }
        email:          { type: string }
        role:           { type: string, enum: [admin, management, hod, manager, employee] }
        designation:    { type: ["string", "null"] }
        company:       { type: ["string", "null"] }
        departmentId:   { type: integer }
        departmentName: { type: string }
        managerId:      { type: ["integer", "null"] }
        managerName:    { type: ["string", "null"] }
        phone:          { type: ["string", "null"] }
        joiningDate:    { type: ["string", "null"] }
        createdAt:      { type: string }

    EmployeeInput:
      type: object
      required: [name, email, role, departmentId]
      properties:
        name:         { type: string, minLength: 1 }
        email:        { type: string }
        role:         { type: string, enum: [admin, management, hod, manager, employee] }
        designation:  { type: string }
        company:      { type: string }
        departmentId: { type: integer }
        managerId:    { type: integer }
        phone:        { type: string }
        joiningDate:  { type: string }

    EmployeeUpdate:
      type: object
      properties:
        name:         { type: string }
        email:        { type: string }
        role:         { type: string, enum: [admin, management, hod, manager, employee] }
        designation:  { type: string }
        company:      { type: string }
        departmentId: { type: integer }
        managerId:    { type: integer }
        phone:        { type: string }
        joiningDate:  { type: string }

    # ── KRA ─────────────────────────────────────────────────────────────────────
    Kra:
      type: object
      required: [id, title, weightage, departmentId, kraStatus, createdAt]
      properties:
        id:             { type: integer }
        title:          { type: string }
        description:    { type: ["string", "null"] }
        weightage:      { type: number }
        achievementPct: { type: ["number", "null"] }
        departmentId:   { type: integer }
        departmentName: { type: string }
        employeeId:     { type: ["integer", "null"] }
        employeeName:   { type: ["string", "null"] }
        reviewPeriod:   { type: string, enum: [monthly, quarterly, yearly] }
        kraStatus:        { type: string, enum: [active, submitted, manager_approved, approved, rejected] }
        hrApprovalStatus: { type: string, enum: [pending_hr, hr_approved, hr_rejected] }
        submittedAt:      { type: ["string", "null"] }
        closedAt:       { type: ["string", "null"] }
        createdAt:      { type: string }

    KraInput:
      type: object
      required: [title, weightage, departmentId, reviewPeriod]
      properties:
        title:        { type: string, minLength: 1 }
        description:  { type: string }
        weightage:    { type: number }
        departmentId: { type: integer }
        employeeId:   { type: integer }
        reviewPeriod: { type: string, enum: [monthly, quarterly, yearly] }

    KraUpdate:
      type: object
      properties:
        title:          { type: string }
        description:    { type: string }
        weightage:      { type: number }
        achievementPct: { type: number }
        reviewPeriod:   { type: string, enum: [monthly, quarterly, yearly] }
        employeeId:     { type: integer }

    HrApproveKraInput:
      type: object
      required: [approved]
      properties:
        approved: { type: boolean }

    KraScoreInput:
      type: object
      required: [achievementPct]
      properties:
        achievementPct: { type: number }

    # ── KPI ─────────────────────────────────────────────────────────────────────
    Kpi:
      type: object
      required: [id, employeeId, month, year, kraAchievement, taskCompletion, productivity, punctuality, discipline, totalScore, rating, createdAt]
      properties:
        id:              { type: integer }
        employeeId:      { type: integer }
        employeeName:    { type: string }
        departmentId:    { type: integer }
        departmentName:  { type: string }
        month:           { type: integer }
        year:            { type: integer }
        kraAchievement:  { type: number }
        taskCompletion:  { type: number }
        productivity:    { type: number }
        punctuality:     { type: number }
        discipline:      { type: number }
        totalScore:      { type: number }
        rating:          { type: string }
        createdAt:       { type: string }

    KpiInput:
      type: object
      required: [employeeId, month, year, kraAchievement, taskCompletion, productivity, punctuality, discipline]
      properties:
        employeeId:     { type: integer }
        month:          { type: integer }
        year:           { type: integer }
        kraAchievement: { type: number }
        taskCompletion: { type: number }
        productivity:   { type: number }
        punctuality:    { type: number }
        discipline:     { type: number }

    KpiUpdate:
      type: object
      properties:
        kraAchievement: { type: number }
        taskCompletion: { type: number }
        productivity:   { type: number }
        punctuality:    { type: number }
        discipline:     { type: number }

    # ── Task ────────────────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, title, status, priority, createdById, assignedToId, departmentId, createdAt]
      properties:
        id:               { type: integer }
        title:            { type: string }
        description:      { type: ["string", "null"] }
        status:           { type: string, enum: [pending, in_progress, completed, delayed, approved, rejected] }
        requestedStatus:  { type: ["string", "null"] }
        priority:         { type: string, enum: [high, medium, low] }
        dueDate:          { type: ["string", "null"] }
        completedAt:      { type: ["string", "null"] }
        createdById:      { type: integer }
        createdByName:    { type: string }
        assignedToId:     { type: integer }
        assignedToName:   { type: string }
        departmentId:     { type: integer }
        departmentName:   { type: string }
        isRecurring:      { type: boolean }
        recurringFreq:    { type: ["string", "null"], enum: [daily, weekly, monthly, quarterly, yearly, null] }
        progressPct:      { type: integer }
        createdAt:        { type: string }

    TaskInput:
      type: object
      required: [title, priority, createdById, assignedToId, departmentId]
      properties:
        title:         { type: string, minLength: 1 }
        description:   { type: string }
        priority:      { type: string, enum: [high, medium, low] }
        dueDate:       { type: string }
        createdById:   { type: integer }
        assignedToId:  { type: integer }
        departmentId:  { type: integer }
        isRecurring:   { type: boolean }
        recurringFreq: { type: string, enum: [daily, weekly, monthly, quarterly, yearly] }

    TaskUpdate:
      type: object
      properties:
        title:         { type: string }
        description:   { type: string }
        priority:      { type: string, enum: [high, medium, low] }
        dueDate:       { type: string }
        assignedToId:  { type: integer }
        isRecurring:   { type: boolean }
        recurringFreq: { type: string, enum: [daily, weekly, monthly, quarterly, yearly] }
        progressPct:   { type: integer }

    TaskStatusInput:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, in_progress, completed, delayed, approved, rejected] }

    TaskComment:
      type: object
      required: [id, taskId, authorId, authorName, content, createdAt]
      properties:
        id:         { type: integer }
        taskId:     { type: integer }
        authorId:   { type: integer }
        authorName: { type: string }
        content:    { type: string }
        createdAt:  { type: string }

    TaskCommentInput:
      type: object
      required: [authorId, content]
      properties:
        authorId: { type: integer }
        content:  { type: string, minLength: 1 }

    # ── Dashboard ────────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalEmployees, totalDepartments, totalTasks, completedTasks, pendingTasks, delayedTasks, avgKpiScore, pendingApprovals]
      properties:
        totalEmployees:   { type: integer }
        totalDepartments: { type: integer }
        totalTasks:       { type: integer }
        completedTasks:   { type: integer }
        pendingTasks:     { type: integer }
        delayedTasks:     { type: integer }
        avgKpiScore:      { type: number }
        pendingApprovals: { type: integer }

    DepartmentPerformance:
      type: object
      required: [departmentId, departmentName, employeeCount, avgKpiScore, taskCompletionRate, delayedTaskCount]
      properties:
        departmentId:       { type: integer }
        departmentName:     { type: string }
        employeeCount:      { type: integer }
        avgKpiScore:        { type: number }
        taskCompletionRate: { type: number }
        delayedTaskCount:   { type: integer }

    TaskStatusCount:
      type: object
      required: [status, count]
      properties:
        status: { type: string }
        count:  { type: integer }

    EmployeePerformance:
      type: object
      required: [employeeId, employeeName, departmentName, kpiScore, rating, tasksCompleted]
      properties:
        employeeId:     { type: integer }
        employeeName:   { type: string }
        departmentName: { type: string }
        kpiScore:       { type: number }
        rating:         { type: string }
        tasksCompleted: { type: integer }

    ActivityItem:
      type: object
      required: [id, type, description, actorName, createdAt]
      properties:
        id:          { type: integer }
        type:        { type: string, enum: [task_created, task_completed, task_delayed, kpi_updated, kra_scored, employee_added, kra_submitted, kra_approved, kra_rejected, task_status_requested, task_status_approved, task_status_rejected] }
        description: { type: string }
        actorName:   { type: string }
        entityId:    { type: ["integer", "null"] }
        entityType:  { type: ["string", "null"] }
        createdAt:   { type: string }

    ApproveCloseInput:
      type: object
      required: [approved]
      properties:
        approved: { type: boolean }
        reason:   { type: string }

    TaskStatusRequestInput:
      type: object
      required: [status]
      properties:
        status:      { type: string, enum: [in_progress, completed, delayed] }
        progressPct: { type: integer }

    TaskStatusApprovalInput:
      type: object
      required: [approved]
      properties:
        approved: { type: boolean }
        reason:   { type: string }

    EmployeeDashboardSummary:
      type: object
      required: [myTasks, completedTasks, pendingTasks, overdueTasks, myKpiScore, myKpiRating, myKraAvg, taskBreakdown, recentActivity]
      properties:
        myTasks:        { type: integer }
        completedTasks: { type: integer }
        pendingTasks:   { type: integer }
        overdueTasks:   { type: integer }
        myKpiScore:     { type: ["number", "null"] }
        myKpiRating:    { type: ["string", "null"] }
        myKraAvg:       { type: ["number", "null"] }
        taskBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/TaskStatusCount"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    PendingKraApproval:
      type: object
      required: [id, title, employeeId, employeeName, departmentName, kraStatus]
      properties:
        id:             { type: integer }
        title:          { type: string }
        employeeId:     { type: integer }
        employeeName:   { type: string }
        departmentName: { type: string }
        achievementPct: { type: ["number", "null"] }
        kraStatus:      { type: string }
        submittedAt:    { type: ["string", "null"] }

    PendingTaskApproval:
      type: object
      required: [id, title, assignedToId, assignedToName, departmentName, status, requestedStatus]
      properties:
        id:               { type: integer }
        title:            { type: string }
        assignedToId:     { type: integer }
        assignedToName:   { type: string }
        departmentName:   { type: string }
        status:           { type: string }
        requestedStatus:  { type: string }
        progressPct:      { type: integer }

    HrPendingKraApproval:
      type: object
      required: [id, title, departmentName, createdAt]
      properties:
        id:             { type: integer }
        title:          { type: string }
        description:    { type: ["string", "null"] }
        weightage:      { type: number }
        departmentName: { type: string }
        reviewPeriod:   { type: string }
        createdAt:      { type: string }

    PendingApprovals:
      type: object
      required: [kras, tasks, krasPendingHrApproval]
      properties:
        kras:
          type: array
          items:
            $ref: "#/components/schemas/PendingKraApproval"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/PendingTaskApproval"
        krasPendingHrApproval:
          type: array
          items:
            $ref: "#/components/schemas/HrPendingKraApproval"
